name: lex_core
description: "LexCore — Your Legal Command Center. A production-grade LegalTech portfolio application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # === Core (existing) ===
  cupertino_icons: ^1.0.8
  sizer: ^3.1.3
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.2
  http: ^1.5.0
  flutter_riverpod: ^3.0.2
  dio: ^5.9.0
  flutter_svg: ^2.2.1
  file_picker: ^10.3.8
  go_router: ^16.2.4
  smooth_page_indicator: ^1.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  table_calendar: ^3.2.0
  path: ^1.9.1
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1
  device_info_plus: ^12.3.0
  permission_handler: ^12.0.1
  get_it: ^9.2.1
  flutter_staggered_grid_view: ^0.7.0

  # === UI & Animations ===
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0
  flutter_rating_bar: ^4.0.1
  dotted_border: ^2.1.0
  pinput: ^5.0.0

  # === Maps (FREE — No API key) ===
  flutter_map: ^7.0.2
  latlong2: ^0.9.0

  # === Local Database ===
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # === Documents & PDF ===
  pdf: ^3.11.0
  printing: ^5.13.0
  open_file: ^3.5.10
  share_plus: ^10.1.2

  # === Camera & Signature ===
  camera: ^0.11.0
  signature: ^5.4.1

  # === Charts ===
  fl_chart: ^0.68.0

  # === Utility ===
  uuid: ^4.4.2
  pin_code_fields: ^9.4.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  fake_cloud_firestore: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_background: "#0D1117"
  background_color_ios: "#0D1117"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/lottie/
    - assets/seed_data/
